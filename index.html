<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Zumi 임베디드 AI 멀티 인터페이스</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
    /* 기본 모바일 레이아웃 */
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif;
    }

    body {
        background-color: #0b0f19;
        color: #ffffff;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        min-height: 100vh;
        padding: 20px;
        overflow: hidden;
        position: relative;
    }

    header, main, .controls {
        position: relative;
        z-index: 10;
    }

    /* -----------------------------------------------------------
       [개선] 프리셋 셀렉터 전용 바 (투명화 제거, 가독성 100% 확보)
    ----------------------------------------------------------- */
    .preset-container {
        margin-bottom: 12px;
    }
    .preset-select {
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        background-color: #1e293b; /* 투명하지 않은 견고한 슬레이트 네이비 배경 */
        border: 2px solid rgba(255, 255, 255, 0.2);
        color: #ffffff;
        font-size: 0.95rem;
        font-weight: bold;
        outline: none;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        cursor: pointer;
        appearance: none; /* 브라우저 기본 화살표 제거 후 커스텀 스타일 가능 디자인 */
        -webkit-appearance: none;
    }

    /* 드롭다운을 눌렀을 때 나오는 내부 목록(옵션) 스타일 강제 지정 */
    .preset-select option {
        background-color: #1e293b; /* 투명도 절대 없음 */
        color: #ffffff;
        font-weight: bold;
        padding: 14px;
    }

    /* -----------------------------------------------------------
       [테마별 커스텀 배경 및 레이아웃 엔진]
    ----------------------------------------------------------- */
    .theme-screen {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: 1;
        transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        display: none;
        opacity: 0;
    }
    .theme-screen.active {
        display: block;
        opacity: 1;
    }

    /* 1. 스마트카: HUD 테슬라 스타일 계기판 배경 */
    #screen-smartcar {
        background: radial-gradient(circle at center, #111c34 0%, #060913 100%);
    }
    #screen-smartcar .hud-circle {
        position: absolute;
        top: 50%; left: 50%; transform: translate(-50%, -50%);
        width: 280px; height: 280px;
        border: 2px dashed rgba(0, 229, 255, 0.15);
        border-radius: 50%;
        animation: spin 20s linear infinite;
    }

    /* 2. AI 택시: 호출용 내비게이션 지도 그리드 노선 */
    #screen-taxi {
        background: #1e1e24;
    }
    #screen-taxi .map-grid {
        position: absolute;
        width: 100%; height: 100%;
        background-image: linear-gradient(rgba(245, 158, 11, 0.05) 2px, transparent 2px), linear-gradient(90deg, rgba(245, 158, 11, 0.05) 2px, transparent 2px);
        background-size: 40px 40px;
    }
    #screen-taxi .route-line {
        position: absolute;
        top: 40%; left: -10%; width: 120%; height: 4px;
        background: #f59e0b;
        transform: rotate(15deg);
        box-shadow: 0 0 15px #f59e0b;
    }

    /* 3. 로봇비서: 은은한 스마트홈 스마트 그라데이션 */
    #screen-assistant {
        background: linear-gradient(135deg, #eef2f6 0%, #dfe7f0 100%);
    }
    #screen-assistant .orb {
        position: absolute;
        top: 45%; left: 50%; transform: translate(-50%, -50%);
        width: 200px; height: 200px;
        background: radial-gradient(circle, rgba(99,102,241,0.2) 0%, rgba(99,102,241,0) 70%);
        animation: floatOrb 4s ease-in-out infinite alternate;
    }

    /* 4. 물류 로봇: 팩토리 디지털 바코드 인터페이스 */
    #screen-delivery {
        background: #0f172a;
    }
    #screen-delivery .laser-line {
        position: absolute;
        width: 100%; height: 1px;
        background: rgba(249, 115, 22, 0.5);
        box-shadow: 0 0 10px #f97316;
        animation: scan 3s linear infinite;
    }

    /* 5. 안내 로봇: 호텔/빌딩 무인 키오스크 유리 텍스처 */
    #screen-guide {
        background: #f4f4f5;
    }
    #screen-guide .bg-pattern {
        position: absolute;
        width: 100%; height: 100%;
        background: radial-gradient(#e4e4e7 2px, transparent 2px);
        background-size: 24px 24px;
    }

    /* 6. 우주 탐사선: 나사 제어소 스캔 격자 스크린 */
    #screen-mars {
        background: #1c0a00;
    }
    #screen-mars .radar-line {
        position: absolute;
        top: 50%; left: 50%; width: 350px; height: 350px;
        border: 1px solid rgba(234, 179, 8, 0.3);
        border-radius: 50%;
        transform: translate(-50%, -50%);
    }
    #screen-mars .radar-line::before {
        content: ""; position: absolute; top:0; left:50%; width:2px; height:50%; background: #eab308; transform-origin: bottom center; animation: spin 4s linear infinite;
    }

    /* -----------------------------------------------------------
       [테마별 특화 대시보드 인포창 (위젯)]
    ----------------------------------------------------------- */
    .app-dashboard {
        padding: 16px;
        border-radius: 16px;
        margin-top: 10px;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.1);
        box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    .dash-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .dash-meta {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        opacity: 0.7;
    }
    .dash-value {
        font-size: 1.2rem;
        font-weight: 800;
    }

    /* -----------------------------------------------------------
       [공통 메인 뷰어 영역]
    ----------------------------------------------------------- */
    .main-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        margin: 20px 0;
    }

    #status {
        font-size: 0.8rem;
        padding: 5px 12px;
        border-radius: 20px;
        font-weight: bold;
        margin-bottom: 25px;
        background: rgba(0,0,0,0.4);
        border: 1px solid rgba(255,255,255,0.2);
    }

    #speechStatus {
        font-size: 1.1rem;
        font-weight: 800;
        margin-bottom: 12px;
    }

    #result {
        width: 100%;
        max-width: 380px;
        min-height: 120px;
        font-size: 1.6rem;
        font-weight: bold;
        line-height: 1.5;
        word-break: keep-all;
    }

    /* -----------------------------------------------------------
       [하단 음성인식 버튼 컨트롤러]
    ----------------------------------------------------------- */
    .controls {
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .mic-container {
        position: relative;
        width: 90px;
        height: 90px;
    }

    .mic-btn {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: none;
        outline: none;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        position: relative;
        z-index: 5;
    }
    .mic-btn svg {
        width: 36px; height: 36px;
        fill: #ffffff;
        transition: all 0.3s;
    }

    /* 녹음 작동 상태 애니메이션 */
    .mic-btn.listening {
        background: #ef4444 !important;
        transform: scale(1.08);
        box-shadow: 0 0 30px rgba(239, 68, 68, 0.6) !important;
    }
    .mic-btn.listening svg {
        animation: shake 0.4s infinite alternate;
    }

    .pulse-ring {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        border-radius: 50%;
        background: rgba(239, 68, 68, 0.4);
        opacity: 0;
    }
    .mic-btn.listening + .pulse-ring {
        animation: pulse 1.3s infinite linear;
    }

    /* 하단 숨김형 MQTT 토픽 박스 */
    .sub-topic-box {
        margin-top: 15px;
        font-size: 0.75rem;
        opacity: 0.6;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .sub-topic-box input {
        background: transparent;
        border: none;
        border-bottom: 1px solid rgba(255,255,255,0.3);
        color: inherit;
        font-size: 0.75rem;
        outline: none;
        width: 120px;
        text-align: center;
    }

    /* -----------------------------------------------------------
       [키프레임 애니메이션 모음]
    ----------------------------------------------------------- */
    @keyframes spin { 100% { transform: translate(-50%, -50%) rotate(360deg); } }
    @keyframes scan { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }
    @keyframes floatOrb { 0% { transform: translate(-50%, -45%) scale(1); } 100% { transform: translate(-50%, -55%) scale(1.1); } }
    @keyframes pulse { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.8); opacity: 0; } }
    @keyframes shake { 0% { transform: rotate(-6deg); } 100% { transform: rotate(6deg); } }

</style>
</head>
<body>

<div id="screen-smartcar" class="theme-screen active"><div class="hud-circle"></div></div>
<div id="screen-taxi" class="theme-screen"><div class="map-grid"></div><div class="route-line"></div></div>
<div id="screen-assistant" class="theme-screen"><div class="orb"></div></div>
<div id="screen-delivery" class="theme-screen"><div class="laser-line"></div></div>
<div id="screen-guide" class="theme-screen"><div class="bg-pattern"></div></div>
<div id="screen-mars" class="theme-screen"><div class="radar-line"></div></div>

<header>
    <div class="preset-container">
        <select id="uiPreset" class="preset-select" onchange="changePresetEngine()">
            <option value="smartcar">🏎️ [스마트카] Autopilot 주행 스크린</option>
            <option value="taxi">🚖 [AI 택시] T-Map 실시간 배차 보드</option>
            <option value="assistant">🔮 [로봇비서] Home IoT 스마트 킷</option>
            <option value="delivery">📦 [물류로봇] AGV 자율 수송 시스템</option>
            <option value="guide">🏢 [안내로봇] 빌딩 무인 인포메이션</option>
            <option value="mars">🚀 [행성탐사] NASA 우주 로버 원격 관제</option>
        </select>
    </div>

    <div class="app-dashboard" id="appDashboard">
        <div class="dash-row">
            <div>
                <div class="dash-meta" id="dashMetaLabel">차량 하드웨어</div>
                <div class="dash-value" id="dashMainValue">Zumi HUD 연동 완료</div>
            </div>
            <div id="dashStatusBadge" style="font-size: 1.5rem;">⚡</div>
        </div>
    </div>
</header>

<main class="main-container">
    <div id="status">연결 확인 중...</div>
    <div id="speechStatus">주행 대시보드 스탠바이</div>
    <div id="result"></div>
</main>

<div class="controls">
    <div class="mic-container">
        <button id="voiceButton" class="mic-btn">
            <svg viewBox="0 0 24 24">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
            </svg>
        </button>
        <div class="pulse-ring"></div>
    </div>

    <div class="sub-topic-box" id="topicBox">
        <span>MQTT:</span>
        <input type="text" id="topic" value="student01/cmd" autocomplete="off" spellcheck="false">
    </div>
</div>

<script>
const appPresets = {
    smartcar: {
        themeClass: "screen-smartcar", btnBg: "#00e5ff", text: "#ffffff", sub: "#7084b0",
        dMeta: "Autopilot 관제 시스템", dValue: "HUD 크루즈 모드 대기", dBadge: "🏎️",
        placeholder: "📍 자율주행 주행 제어\n\"앞으로 20센티 전진\", \"우회전\"\nZumi 조종 음성을 입력해 주세요."
    },
    taxi: {
        themeClass: "screen-taxi", btnBg: "#f59e0b", text: "#ffffff", sub: "#9ca3af",
        dMeta: "실시간 미터기 정보", dValue: "영업 상태: 대기 중", dBadge: "🚕",
        placeholder: "🚖 AI 호출 택시 플랫폼\n\"서울역으로 출발해줘\"\n목적지 노선을 지시하세요."
    },
    assistant: {
        themeClass: "screen-assistant", btnBg: "#6366f1", text: "#1f2937", sub: "#6b7280",
        dMeta: "AI 스마트 싱크 링크", dValue: "개인 로봇 비서 활성화", dBadge: "🔮",
        placeholder: "🤖 로봇 비서 커넥트\n\"오늘 날씨 알려줘\", \"순찰 시작\"\n수행할 비서 업무를 말씀하세요."
    },
    delivery: {
        themeClass: "screen-delivery", btnBg: "#f97316", text: "#f8fafc", sub: "#94a3b8",
        dMeta: "AGV 적재 물류 현황", dValue: "배터리 100% [도어 잠김]", dBadge: "📦",
        placeholder: "🏭 자율 물류 로봇 시스템\n\"A-3 구역으로 자재 배송해\"\n물류 이송 지시를 내리세요."
    },
    guide: {
        themeClass: "screen-guide", btnBg: "#0ea5e9", text: "#18181b", sub: "#71717a",
        dMeta: "인포 무인 키오스크", dValue: "안내 스크린 정상 작동", dBadge: "🏢",
        placeholder: "💁 빌딩 인포메이션 로봇\n\"화장실 어디야?\", \"로비로 이동\"\n원하는 길 안내를 요청해 보세요."
    },
    mars: {
        themeClass: "screen-mars", btnBg: "#eab308", text: "#fef3c7", sub: "#b45309",
        dMeta: "Deep Space 원격 터미널", dValue: "위성 신호 양호 (PING 1.2s)", dBadge: "🛰️",
        placeholder: "🚀 행성 탐사선 로버 조종\n\"정면 전방 촬영\", \"토양 분석\"\nNASA 탐사선 통제 명령을 하달하세요."
    }
};

let currentPlaceholder = appPresets.smartcar.placeholder;

function changePresetEngine() {
    const selected = document.getElementById("uiPreset").value;
    const config = appPresets[selected];

    document.querySelectorAll('.theme-screen').forEach(scr => scr.classList.remove('active'));
    document.getElementById(`screen-${selected}`).classList.add('active');

    document.body.style.color = config.text;
    document.getElementById("speechStatus").style.color = config.sub;
    document.getElementById("status").style.color = config.text;
    document.getElementById("topicBox").style.color = config.text;

    document.getElementById("dashMetaLabel").innerText = config.dMeta;
    document.getElementById("dashMainValue").innerText = config.dValue;
    document.getElementById("dashStatusBadge").innerText = config.dBadge;

    const dash = document.getElementById("appDashboard");
    if(selected === "assistant" || selected === "guide") {
        dash.style.background = "rgba(0, 0, 0, 0.05)";
        dash.style.borderColor = "rgba(0, 0, 0, 0.1)";
    } else {
        dash.style.background = "rgba(255, 255, 255, 0.05)";
        dash.style.borderColor = "rgba(255, 255, 255, 0.1)";
    }

    const micBtn = document.getElementById("voiceButton");
    micBtn.style.background = config.btnBg;

    currentPlaceholder = config.placeholder;
    const resultDiv = document.getElementById("result");
    if(resultDiv.getAttribute('data-has-text') !== 'true') {
        resultDiv.innerText = currentPlaceholder;
        resultDiv.style.color = config.sub;
    }
}

// MQTT 및 음성 로직 유지
const client = mqtt.connect("wss://broker.emqx.io:8084/mqtt");
const statusDiv = document.getElementById("status");
const speechStatusDiv = document.getElementById("speechStatus");
const resultDiv = document.getElementById("result");
const button = document.getElementById("voiceButton");

let isListening = false;
resultDiv.innerText = currentPlaceholder;

client.on("connect", () => {
    statusDiv.innerText = "● NETWORK CONNECTED";
    statusDiv.style.borderColor = "#22c55e";
    statusDiv.style.color = "#22c55e";
});

client.on("error", () => {
    statusDiv.innerText = "● CONNECTION FAILED";
    statusDiv.style.borderColor = "#ef4444";
    statusDiv.style.color = "#ef4444";
});

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if(!SpeechRecognition) alert("Web Speech 인프라를 로드할 수 없습니다.");

const recognition = new SpeechRecognition();
recognition.lang = "ko-KR";
recognition.interimResults = true;
recognition.continuous = false;

button.onclick = () => {
    if(isListening){
        recognition.stop();
        return;
    }
    isListening = true;
    button.classList.add("listening");
    speechStatusDiv.innerText = "🎙️ 실시간 보이스 트래킹 중...";

    resultDiv.innerText = "";
    resultDiv.style.color = "inherit";
    resultDiv.setAttribute('data-has-text', 'true');
    recognition.start();
};

recognition.onresult = (event) => {
    let realtimeText = "";
    for(let i = 0; i < event.results.length; i++){
        realtimeText += event.results[i][0].transcript;
    }
    resultDiv.innerText = realtimeText;

    const lastResult = event.results[event.results.length - 1];
    if(lastResult.isFinal){
        const finalText = lastResult[0].transcript;
        const topic = document.getElementById("topic").value;
        client.publish(topic, finalText);

        speechStatusDiv.innerText = "✓ MQTT 패킷 발행 완료";
    }
};

recognition.onend = () => {
    isListening = false;
    button.classList.remove("listening");
    setTimeout(() => {
        if(!isListening){
            speechStatusDiv.innerText = "대시보드 링크 스탠바이";
            const selected = document.getElementById("uiPreset").value;
            if(resultDiv.innerText.trim() === "") {
                resultDiv.innerText = currentPlaceholder;
                resultDiv.style.color = appPresets[selected].sub;
                resultDiv.removeAttribute('data-has-text');
            }
        }
    }, 1200);
};

recognition.onerror = (event) => {
    speechStatusDiv.innerText = "FAIL: " + event.error;
    isListening = false;
    button.classList.remove("listening");
};

changePresetEngine();
</script>
</body>
</html>
