<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 음성 제어 리모컨</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>

<style>
    body { font-family: sans-serif; text-align: center; padding-top: 50px; }
    button { padding: 15px 30px; font-size: 18px; cursor: pointer; background-color: #4CAF50; color: white; border: none; border-radius: 5px; }
    button:disabled { background-color: #ccc; }
    #status { color: #666; margin-top: 20px; font-weight: bold; }
    #result { margin-top: 10px; font-size: 20px; color: blue; }
    #ai-match { margin-top: 10px; font-size: 24px; color: green; font-weight: bold; }
</style>
</head>
<body>

<h2>AI 음성 제어 테스트 (문장 유사도)</h2>
<div id="loading-zone">
    <p id="loading-msg">🤖 AI 모델 파일을 다운로드하는 중... (최초 1회만 진행)</p>
    <progress id="loading-bar" value="0" max="100" style="width: 300px; height: 20px;"></progress>
    <span id="loading-pct">0%</span>
</div>
<button id="start-btn" onclick="startRecognition()" disabled>말하기 시작</button>

<p id="status">대기 중...</p>
<p id="result">내가 한 말: -</p>
<hr>
<p id="ai-match">🤖 AI 분석 결과: -</p>

<script type="module">
// 웹 환경에서 안전하게 Transformers.js와 수학 계산 함수를 가져옵니다.
import { pipeline, cosine_similarity } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.14.0';

// EMQX 공용 MQTT 서버 연결
const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
const MQTT_TOPIC = "mic_to_move/test_room"; // 학생마다 다르게 줄 방 이름

let extractor = null;

// 3. 우리가 스크래치 로봇에게 시킬 '기준 명령어' 정의
// 페이지가 켜지자마자 AI 모델을 브라우저 메모리에 로드합니다. (약 23MB)
// 스크립트 상단 import 문 바로 아래에 이 설정을 추가하면
// 브라우저가 로컬 경로를 찾지 않고 허깅페이스 CDN에서 파일을 곧바로 안정적으로 다운로드합니다.
import { env, pipeline, cosine_similarity } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.14.0';
env.allowLocalModels = false;

const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
const MQTT_TOPIC = "mic_to_move/test_room";

let extractor = null;
const base_commands = ["앞으로 가라", "뒤로 가라", "오른쪽으로 돌아", "왼쪽으로 돌아", "멈춰"];
let base_embeddings = [];

// 💡 실시간 다운로드 퍼센트를 표시하도록 업그레이드된 초기화 함수
async function initAI() {
    const progressBar = document.getElementById('loading-bar');
    const progressPct = document.getElementById('loading-pct');
    const loadingZone = document.getElementById('loading-zone');

    try {
        // pipeline의 3번째 인자에 콜백 함수를 넣으면 다운로드 상황을 실시간으로 추적할 수 있습니다.
        extractor = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2', {
            progress_callback: (data) => {
                // 모델 파일 전송 상태가 'progress'일 때만 게이지를 올립니다.
                if (data.status === 'progress') {
                    // data.progress는 0~100 사이의 숫자로 들어옵니다.
                    const progressValue = Math.round(data.progress);
                    progressBar.value = progressValue;
                    progressPct.innerText = `${progressValue}%`;
                }
            }
        });

        // 모델 다운로드가 끝나면 기준 명령어 수치화 진행
        document.getElementById('loading-msg').innerText = "🤖 명령어 데이터를 분석하는 중...";
        base_embeddings = await Promise.all(
            base_commands.map(cmd => extractor(cmd, { pooling: 'mean', normalize: true }))
        );

        // 모든 준비가 완료되면 로딩 UI를 숨기고 버튼 활성화
        loadingZone.style.display = 'none';
        document.getElementById('start-btn').disabled = false;
        document.getElementById('status').innerText = "AI 준비 완료! 버튼을 누르고 말씀하세요.";
    } catch (e) {
        document.getElementById('loading-msg').innerText = "AI 로딩 실패: " + e.message;
        console.error(e);
    }
}

// 음성 인식 결과를 받아 의미를 비교하는 핵심 함수
async function analyzeSpeechIntent(student_speech) {
    document.getElementById('status').innerText = "🤖 AI가 의미를 분석하는 중...";

    // 학생들이 한 말을 AI 숫자로 변환
    const speech_embedding = await extractor(student_speech, { pooling: 'mean', normalize: true });

    let max_similarity = -1;
    let best_match_index = 0;

    // 학생들이 한 말과 기준 명령어들의 의미를 수학적으로 비교 (코사인 유사도)
    for (let i = 0; i < base_embeddings.length; i++) {
        const similarity = cosine_similarity(speech_embedding.data, base_embeddings[i].data);
        if (similarity > max_similarity) {
            max_similarity = similarity;
            best_match_index = i;
        }
    }

    // 유사도가 최소 45%(0.45)는 넘어야 정상적인 명령어로 인정합니다.
    if (max_similarity > 0.45) {
        const final_command = base_commands[best_match_index];
        const pct = Math.round(max_similarity * 100);

        document.getElementById('ai-match').innerText = `🤖 AI 분석 결과: "${final_command}" (${pct}% 일치)`;
        document.getElementById('status').innerText = "전송 완료!";

        // 🎯 스크래치가 구독 중인 EMQX 서버로 정제된 단어만 쏙 보냅니다!
        client.publish(MQTT_TOPIC, final_command);
    } else {
        document.getElementById('ai-match').innerText = `🤖 AI 분석 결과: 이해할 수 없음 (가장 비슷한 단어: ${base_commands[best_match_index]})`;
        document.getElementById('status').innerText = "의미가 불분명하여 전송하지 않았습니다.";
    }
}

// 음성 인식 시작 (전역 함수로 등록하여 onclick에서 호출 가능하게 함)
window.startRecognition = function() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        alert("사파리(Safari) 브라우저를 사용해 주세요!");
        return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = 'ko-KR';
    recognition.interimResults = false;
    recognition.continuous = false;

    recognition.onstart = function() {
        document.getElementById('status').innerText = "듣고 있습니다... 말씀하세요.";
    };

    recognition.onresult = function(event) {
        let text = event.results[0][0].transcript;
        document.getElementById('result').innerText = `내가 한 말: "${text}"`;

        // 음성 인식 텍스트를 AI 분석 함수로 전달!
        analyzeSpeechIntent(text);
    };

    recognition.onerror = function(e) {
        document.getElementById('status').innerText = "에러 발생: " + e.error;
    };

    recognition.start();
};

// 웹페이지 시작 시 AI 초기화 실행
initAI();
</script>

</body>
</html>
