<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Zumi 임베디드 AI 멀티 인터페이스</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
    /* 기본 모바일 레이아웃 최적화 */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif; }

    body {
        background-color: #0b0f19; color: #ffffff; display: flex; flex-direction: column;
        justify-content: space-between; min-height: 100vh; padding: 12px; overflow: hidden; position: relative;
    }
    header, main, .controls { position: relative; z-index: 10; }

    /* 프리셋 셀렉터 전용 바 */
    .preset-container { margin-bottom: 8px; }
    .preset-select {
        width: 100%; padding: 10px 14px; border-radius: 10px; background-color: #1e293b; border: 2px solid rgba(255, 255, 255, 0.2);
        color: #ffffff; font-size: 0.9rem; font-weight: bold; outline: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; appearance: none; -webkit-appearance: none;
    }

    /* 테마별 커스텀 배경 및 레이아웃 엔진 */
    .theme-screen { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 1; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); display: none; opacity: 0; }
    .theme-screen.active { display: block; opacity: 1; }

    #screen-smartcar { background: radial-gradient(circle at center, #111c34 0%, #060913 100%); }
    #screen-smartcar .hud-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; height: 280px; border: 2px dashed rgba(0, 229, 255, 0.15); border-radius: 50%; animation: spin 20s linear infinite; }
    #screen-taxi { background: #1e1e24; }
    #screen-taxi .map-grid { position: absolute; width: 100%; height: 100%; background-image: linear-gradient(rgba(245, 158, 11, 0.05) 2px, transparent 2px), linear-gradient(90deg, rgba(245, 158, 11, 0.05) 2px, transparent 2px); background-size: 40px 40px; }
    #screen-taxi .route-line { position: absolute; top: 40%; left: -10%; width: 120%; height: 4px; background: #f59e0b; transform: rotate(15deg); box-shadow: 0 0 15px #f59e0b; }
    #screen-assistant { background: linear-gradient(135deg, #eef2f6 0%, #dfe7f0 100%); }
    #screen-assistant .orb { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; background: radial-gradient(circle, rgba(99,102,241,0.2) 0%, rgba(99,102,241,0) 70%); animation: floatOrb 4s ease-in-out infinite alternate; }
    #screen-delivery { background: #0f172a; }
    #screen-delivery .laser-line { position: absolute; width: 100%; height: 1px; background: rgba(249, 115, 22, 0.5); box-shadow: 0 0 10px #f97316; animation: scan 3s linear infinite; }
    #screen-guide { background: #f4f4f5; }
    #screen-guide .bg-pattern { position: absolute; width: 100%; height: 100%; background: radial-gradient(#e4e4e7 2px, transparent 2px); background-size: 24px 24px; }
    #screen-mars { background: #1c0a00; }
    #screen-mars .radar-line { position: absolute; top: 50%; left: 50%; width: 350px; height: 350px; border: 1px solid rgba(234, 179, 8, 0.3); border-radius: 50%; transform: translate(-50%, -50%); }
    #screen-mars .radar-line::before { content: ""; position: absolute; top:0; left:50%; width:2px; height:50%; background: #eab308; transform-origin: bottom center; animation: spin 4s linear infinite; }

    /* 대시보드 인포창 */
    .app-dashboard { padding: 12px; border-radius: 12px; margin-top: 6px; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 8px 32px rgba(0,0,0,0.2); background: rgba(255, 255, 255, 0.05); }
    .dash-row { display: flex; justify-content: space-between; align-items: center; }
    .dash-meta { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.8px; opacity: 0.7; }
    .dash-value { font-size: 1.05rem; font-weight: 800; }

    /* 공통 메인 뷰어 영역 */
    /* 공통 메인 뷰어 영역 - 여백 밸런스 전면 교정 */
    .main-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        margin: 4px 0;
    }

    #status {
        font-size: 0.75rem; padding: 4px 10px; border-radius: 20px; font-weight: bold;
        margin-bottom: 8px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2);
    }

    #speechStatus { font-size: 0.95rem; font-weight: 800; margin-bottom: 4px; color: #7084b0; }

    /* 1. 내가 입력한 목소리창: 아래쪽 공백을 4px로 대폭 줄임 */
    #result {
        width: 100%; max-width: 380px; min-height: 40px;
        font-size: 1.25rem; font-weight: bold; line-height: 1.2;
        word-break: keep-all;
        margin-bottom: 0px;    /* 💡 아래쪽 여백을 완전히 제로(0)로 봉쇄 */
        padding-bottom: 0px;
    }

    /* 2. AI 판단창 (글자 크기 축소 버전) */
    #ai-match {
        font-size: 0.95rem;     /* 💡 비율에 맞춰 글씨를 살짝 더 콤팩트하게 다이어트 */
        color: #22c55e;
        font-weight: 800;
        min-height: 20px;
        word-break: keep-all;

        margin-top: -2px;      /* 💡 마이너스 마진을 주어 위의 목소리 텍스트 밑으로 바짝 끌어당김! */
        margin-bottom: 20px;   /* 💡 대신 아래쪽 로봇 메시지와는 20px로 시원하게 공백 확보 */
    }

    /* 3. 로봇 응답 메시지창 */
    #robot-response {
        font-size: 0.9rem; color: #4ade80; font-weight: bold; min-height: 25px;
        opacity: 0.9; background: rgba(74, 222, 128, 0.1); padding: 4px 12px; border-radius: 15px;
        display: inline-block;

        margin-top: 0px;       /* 💡 위쪽 AI 판단창이 밀어준 20px 여백 덕분에 자동으로 아래로 격리됨 */
    }
    /* 하단 컨트롤러 */
    .controls { display: flex; flex-direction: column; align-items: center; width: 100%; }
    .mic-container { position: relative; width: 70px; height: 70px; }
    .mic-btn { width: 100%; height: 100%; border-radius: 50%; border: none; outline: none; cursor: pointer; display: flex; justify-content: center; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; z-index: 5; background: #00e5ff; }
    .mic-btn svg { width: 28px; height: 28px; fill: #ffffff; transition: all 0.3s; }
    .mic-btn:disabled { background-color: #4b5563 !important; cursor: not-allowed; opacity: 0.6; }
    .mic-btn.listening { background: #ef4444 !important; transform: scale(1.05); box-shadow: 0 0 30px rgba(239, 68, 68, 0.6) !important; }
    .mic-btn.listening svg { animation: shake 0.4s infinite alternate; }
    .pulse-ring { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; background: rgba(239, 68, 68, 0.4); opacity: 0; }
    .mic-btn.listening + .pulse-ring { animation: pulse 1.3s infinite linear; }

    /* 민감도 설정 슬라이더 위젯 바 */
    .slider-box {
        width: 100%; max-width: 320px; margin-top: 8px; background: rgba(255, 255, 255, 0.05);
        padding: 6px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
        display: flex; flex-direction: column; gap: 2px; font-size: 0.7rem; opacity: 0.8;
    }
    .slider-row { display: flex; justify-content: space-between; font-weight: bold; }
    .slider-box input[type="range"] { width: 100%; cursor: pointer; accent-color: #38bdf8; margin-top: 2px; }

    .sub-topic-box { margin-top: 8px; font-size: 0.75rem; opacity: 0.6; display: flex; align-items: center; gap: 6px; }
    .sub-topic-box input { background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.3); color: inherit; font-size: 0.75rem; outline: none; width: 120px; text-align: center; }

    .ai-loading-box { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255,255,255,0.15); padding: 10px; border-radius: 12px; margin-top: 6px; font-size: 0.8rem; text-align: center; }
    progress { width: 100%; height: 10px; border-radius: 5px; margin-top: 4px; }
</style>
</head>
<body>

<div id="screen-smartcar" class="theme-screen active"><div class="hud-circle"></div></div>
<div id="screen-taxi" class="theme-screen"><div class="map-grid"></div><div class="route-line"></div></div>
<div id="screen-assistant" class="theme-screen"><div class="orb"></div></div>
<div id="screen-delivery" class="theme-screen"><div class="laser-line"></div></div>
<div id="screen-guide" class="theme-screen"><div class="bg-pattern"></div></div>
<div id="screen-mars" class="theme-screen"><div class="radar-line"></div></div>

<header>
<div class="preset-container" style="display: flex; flex-direction: column; gap: 6px; width: 100%;">
        <select id="uiPreset" class="preset-select" onchange="window.changePresetEngine()" style="width: 100%; padding: 10px 8px; font-size: 0.8rem;">
            <option value="smartcar">🏎️ [스마트카] Autopilot 주행 스크린</option>
            <option value="taxi">🚖 [AI 택시] T-Map 실시간 배차 보드</option>
            <option value="assistant">🔮 [로봇비서] Home IoT 스마트 킷</option>
            <option value="delivery">📦 [물류로봇] AGV 자율 수송 시스템</option>
            <option value="guide">🏢 [안내로봇] 빌딩 무인 인포메이션</option>
            <option value="mars">🚀 [행성탐사] NASA 우주 로버 원격 관제</option>
        </select>

        <div style="display: flex; gap: 6px; width: 100%;">
            <div id="topicBox" style="flex: 1; display: flex; align-items: center; gap: 4px; background: #1e293b; border: 2px solid rgba(255, 255, 255, 0.2); padding: 8px; border-radius: 10px;">
                <span style="font-size: 0.65rem; font-weight: bold; color: #38bdf8; white-space: nowrap;">보낼 채널:</span>
                <input type="text" id="topic" value="student01/cmd" autocomplete="off" spellcheck="false"
                       style="background: transparent; border: none; color: #ffffff; font-size: 0.75rem; font-weight: bold; outline: none; width: 100%; text-align: center; padding: 0;">
            </div>

            <div id="subTopicBox" style="flex: 1; display: flex; align-items: center; gap: 4px; background: #1e293b; border: 2px solid rgba(255, 255, 255, 0.2); padding: 8px; border-radius: 10px;">
                <span style="font-size: 0.65rem; font-weight: bold; color: #4ade80; white-space: nowrap;">받을 채널:</span>
                <input type="text" id="subTopic" value="student01/res" autocomplete="off" spellcheck="false"
                       style="background: transparent; border: none; color: #ffffff; font-size: 0.75rem; font-weight: bold; outline: none; width: 100%; text-align: center; padding: 0;">
            </div>
        </div>
    </div>

    <div class="app-dashboard" id="appDashboard">
        <div class="dash-row">
            <div>
                <div class="dash-meta" id="dashMetaLabel">Autopilot 관제 시스템</div>
                <div class="dash-value" id="dashMainValue">HUD 크루즈 모드 대기</div>
            </div>
            <div id="dashStatusBadge" style="font-size: 1.3rem;">🏎️</div>
        </div>
    </div>

    <div class="app-dashboard ai-loading-box" id="loadingZone">
        <span id="loading-msg" style="font-weight: bold; color: #38bdf8;">🤖 AI 로봇 두뇌 로딩 중...</span>
        <div style="display: flex; align-items: center; gap: 10px; margin-top: 4px;">
            <progress id="loading-bar" value="0" max="100"></progress>
            <span id="loading-pct" style="font-weight: bold; width: 35px; font-size: 0.75rem;">0%</span>
        </div>
    </div>

    <div class="app-dashboard" style="margin-top: 6px; padding: 0; overflow: hidden; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.1); width: 100%;">
        <button id="accordion-toggle-btn" style="width: 100%; padding: 10px 14px; background: transparent; border: none; color: #38bdf8; font-weight: bold; font-size: 0.8rem; text-align: left; display: flex; justify-content: space-between; align-items: center; cursor: pointer; outline: none; -webkit-tap-highlight-color: transparent;">
            <span>🧠 AI 명령어 훈련소 (열기/닫기)</span>
            <span id="accordion-arrow" style="transition: transform 0.3s ease;">▼</span>
        </button>
        <div id="accordion-content" style="max-height: 0px; overflow: hidden; transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1); background: rgba(15, 23, 42, 0.4);">
            <div style="padding: 12px; border-top: 1px solid rgba(255,255,255,0.05);">
                <div id="command-tags-container" style="display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; max-height: 90px; overflow-y: auto; padding-right: 4px;"></div>
                <div style="display: flex; gap: 6px; align-items: center;">
                    <input type="text" id="new-command-input" placeholder="새 명령어 입력"
                           style="flex: 1; padding: 8px; border-radius: 6px; background: #0f172a; border: 1px solid rgba(255,255,255,0.2); color: white; font-size: 0.75rem; outline: none;">
                    <button id="add-command-btn" onclick="window.addNewAIVocabulary()"
                            style="padding: 8px 12px; font-size: 0.75rem; background: #38bdf8; border: none; border-radius: 6px; font-weight: bold; color: white; cursor: pointer; white-space: nowrap;">+ 훈련</button>
                    <button id="accordion-bottom-close-btn" style="padding: 8px 10px; font-size: 0.75rem; background: rgba(248, 113, 113, 0.2); border: 1px solid rgba(248, 113, 113, 0.4); border-radius: 6px; font-weight: bold; color: #f87171; cursor: pointer; white-space: nowrap;">🔼 닫기</button>
                </div>
            </div>
        </div>
    </div>
</header>

<main class="main-container">
    <div id="status">연결 확인 중...</div>
    <div id="speechStatus">대시보드 링크 스탠바이</div>
    <div id="result"></div>
    <div id="ai-match"></div>
    <div id="robot-response" style="font-size: 0.9rem; color: #4ade80; font-weight: bold; min-height: 25px; margin-top: 4px; opacity: 0.9; background: rgba(74, 222, 128, 0.1); padding: 4px 12px; border-radius: 15px; display: inline-block;">🤖 로봇 응답 대기 중...</div>
</main>

<div class="controls">
    <div class="mic-container">
        <button id="voiceButton" class="mic-btn" disabled>
            <svg viewBox="0 0 24 24">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
            </svg>
        </button>
        <div class="pulse-ring"></div>
    </div>

    <div class="slider-box">
        <div class="slider-row">
            <span>🤖 AI 통과 기준 점수:</span>
            <span id="threshold-val" style="font-weight: 900; color: #38bdf8;">0.45</span>
        </div>
        <input type="range" id="threshold-slider" min="0.0" max="1.0" step="0.05" value="0.45">
        <p id="threshold-desc" style="font-size: 0.65rem; margin-top: 2px; line-height: 1.2; font-weight: bold; transition: color 0.3s; white-space: pre-line;"></p>
    </div>


</div>

<script type="module" src="main.js"></script>
</body>
</html>
