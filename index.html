<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>음성 MQTT 제어</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

body{
    font-family:sans-serif;
    padding:20px;
    max-width:500px;
}

h2{
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
}

input{
    width:100%;
    font-size:18px;
    padding:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:20px;
    padding:20px;
    font-size:24px;
}

#status{
    margin-top:20px;
    font-size:20px;
    color:green;
}

#speechStatus{
    margin-top:10px;
    font-size:22px;
    color:red;
}

#result{
    margin-top:20px;
    min-height:80px;
    padding:15px;
    background:#f0f0f0;
    font-size:28px;
    border-radius:10px;
}

</style>

</head>
<body>

<h2>🎤 음성 MQTT 제어</h2>

<label>MQTT Topic</label>

<input
    type="text"
    id="topic"
    value="student01/cmd"
>

<button id="voiceButton">
    말하기 시작
</button>

<div id="status">
MQTT 연결중...
</div>

<div id="speechStatus">
대기중
</div>

<div id="result">
여기에 음성이 표시됩니다.
</div>

<script>

// ----------------------------
// MQTT 연결
// ----------------------------

const client = mqtt.connect(
    "wss://broker.emqx.io:8084/mqtt"
);

const statusDiv =
    document.getElementById("status");

const speechStatusDiv =
    document.getElementById("speechStatus");

const resultDiv =
    document.getElementById("result");

const button =
    document.getElementById("voiceButton");

let isListening = false;

// MQTT 연결 성공
client.on("connect", () => {

    statusDiv.innerText =
        "MQTT 연결 성공";
});

// MQTT 오류
client.on("error", () => {

    statusDiv.innerText =
        "MQTT 연결 실패";
});

// ----------------------------
// 음성 인식 준비
// ----------------------------

const SpeechRecognition =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;

if(!SpeechRecognition){

    alert(
        "이 브라우저는 음성인식을 지원하지 않습니다."
    );
}

const recognition =
    new SpeechRecognition();

recognition.lang = "ko-KR";

// 실시간 표시용
recognition.interimResults = true;

recognition.continuous = false;

// ----------------------------
// 버튼 처리
// ----------------------------

button.onclick = () => {

    // 이미 듣는 중이면 무시
    if(isListening){
        return;
    }

    isListening = true;

    button.disabled = true;

    button.innerText =
        "듣는 중...";

    speechStatusDiv.innerText =
        "🎤 음성 입력중";

    resultDiv.innerText =
        "";

    recognition.start();
};

// ----------------------------
// 음성 결과
// ----------------------------

recognition.onresult = (event) => {

    let realtimeText = "";

    for(let i=0; i<event.results.length; i++){

        realtimeText +=
            event.results[i][0].transcript;
    }

    // 실시간 화면 표시
    resultDiv.innerText =
        realtimeText;

    // 마지막 결과
    const lastResult =
        event.results[event.results.length - 1];

    // 최종 결과면 MQTT 전송
    if(lastResult.isFinal){

        const finalText =
            lastResult[0].transcript;

        const topic =
            document.getElementById(
                "topic"
            ).value;

        client.publish(
            topic,
            finalText
        );

        console.log(
            "MQTT 전송:",
            finalText
        );

        speechStatusDiv.innerText =
            "📤 전송 완료";
    }
};

// ----------------------------
// 종료 처리
// ----------------------------

recognition.onend = () => {

    isListening = false;

    button.disabled = false;

    button.innerText =
        "말하기 시작";

    // 전송완료 상태 유지
    setTimeout(() => {

        if(!isListening){

            speechStatusDiv.innerText =
                "대기중";
        }

    }, 1000);
};

// ----------------------------
// 에러 처리
// ----------------------------

recognition.onerror = (event) => {

    console.log(event.error);

    speechStatusDiv.innerText =
        "에러: " + event.error;

    isListening = false;

    button.disabled = false;

    button.innerText =
        "말하기 시작";
};

</script>

</body>
</html>
